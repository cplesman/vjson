<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VJSON Data Server</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: radial-gradient(circle at top, #f8f9fa 0%, #e9ecef 100%);
      }

      .card {
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
        border: 0;
      }

      #output {
        min-height: 260px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="row mb-3">
        <div class="col">
          <h1 class="h3 mb-1">VJSON CRUD Data Server</h1>
          <p class="text-body-secondary mb-0">Find, Read, Update, Append, and Delete through API-backed forms.</p>
          <a class="btn btn-outline-dark btn-sm mt-2" href="/collections.html">View Collections (depth=1)</a>
        </div>
      </div>

      <div id="statusBar" class="alert d-none" role="alert"></div>

      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h2 class="h5">Read</h2>
            <form id="readForm" class="d-grid gap-2">
              <input id="readPath" class="form-control" value="/" placeholder="Path e.g. /users" />
              <button class="btn btn-primary" type="submit">Read</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h2 class="h5">Find</h2>
            <form id="findForm" class="d-grid gap-2">
              <input id="findPath" class="form-control" value="/products" placeholder="Collection path" />
              <input id="findQuery" class="form-control" value='"price" > 10' placeholder='Query e.g. "price" > 10' />
              <button class="btn btn-primary" type="submit">Find</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h2 class="h5">Append</h2>
            <form id="appendForm" class="d-grid gap-2">
              <input id="appendPath" class="form-control" value="/products" placeholder="Path" />
              <input id="appendKey" class="form-control" value="item2" placeholder="Key (optional)" />
              <textarea id="appendValue" class="form-control" rows="4" placeholder='JSON value'>{"name":"Desk Lamp","price":24.5,"inStock":true}</textarea>
              <button class="btn btn-success" type="submit">Append</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h2 class="h5">Update</h2>
            <form id="updateForm" class="d-grid gap-2">
              <input id="updatePath" class="form-control" value="/products/demo" placeholder="Object path" />
              <input id="updateKey" class="form-control" value="price" placeholder="Field to update" />
              <textarea id="updateValue" class="form-control" rows="3" placeholder="JSON value">29.99</textarea>
              <button class="btn btn-warning" type="submit">Update</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3">
            <h2 class="h5">Delete</h2>
            <form id="deleteForm" class="d-grid gap-2">
              <input id="deletePath" class="form-control" value="/products" placeholder="Object path" />
              <input id="deleteKey" class="form-control" value="item2" placeholder="Key to delete" />
              <button class="btn btn-danger" type="submit">Delete</button>
            </form>
          </div>
        </div>

        <div class="col-12">
          <div class="card p-3">
            <h2 class="h5">Output</h2>
            <pre id="output" class="bg-dark text-light rounded p-3 mb-0">Run any operation to see JSON output.</pre>
          </div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
