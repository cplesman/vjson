<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VJSON Collection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f7fafc 0%, #eaf0f6 100%);
      }

      .card {
        border: 0;
        box-shadow: 0 0.65rem 1.1rem rgba(0, 0, 0, 0.08);
      }

      .mono {
        font-family: Consolas, Monaco, 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Collection Objects</h1>
          <p id="collectionPath" class="text-secondary mb-0 mono"></p>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="/collections.html">Back To Collections</a>
          <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        </div>
      </div>

      <div id="status" class="alert d-none" role="alert"></div>

      <div class="card p-3">
        <div class="border rounded p-3 mb-3 bg-light-subtle">
          <h2 class="h6 mb-2">Create Object</h2>
          <div class="row g-2">
            <div class="col-12 col-md-4">
              <label class="form-label">Key (optional)</label>
              <input id="createKey" class="form-control" placeholder="object key or blank" />
            </div>
            <div class="col-12 col-md-8">
              <label class="form-label">JSON Value</label>
              <input id="createValue" class="form-control mono" value='{"name":"New Object"}' />
            </div>
            <div class="col-12 d-flex justify-content-end">
              <button id="createBtn" class="btn btn-success">Create</button>
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-3">
            <thead>
              <tr>
                <th>Object Key</th>
                <th>Type</th>
                <th>Fields</th>
                <th>Preview</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="objectsBody"></tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center">
          <button id="prevBtn" class="btn btn-outline-primary">Previous</button>
          <span id="pageLabel" class="fw-semibold"></span>
          <button id="nextBtn" class="btn btn-outline-primary">Next</button>
        </div>
      </div>
    </div>

    <script src="/collection.js"></script>
  </body>
</html>
