<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VJSON Collections</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f2f6fb 0%, #e6edf5 100%);
      }

      .card {
        border: 0;
        box-shadow: 0 0.65rem 1.1rem rgba(0, 0, 0, 0.08);
      }

      .mono {
        font-family: Consolas, Monaco, 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Collections</h1>
          <p class="text-secondary mb-0">Loaded with read(path=/, depth=1).</p>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="/">Back To CRUD</a>
          <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        </div>
      </div>

      <div id="status" class="alert d-none" role="alert"></div>

      <div class="card p-3">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Collection</th>
                <th>Type</th>
                <th>Size</th>
                <th>Preview</th>
              </tr>
            </thead>
            <tbody id="collectionsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="/collections.js"></script>
  </body>
</html>
