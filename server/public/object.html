<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VJSON Object Editor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f7f7fb 0%, #e8ebf3 100%);
      }

      .card {
        border: 0;
        box-shadow: 0 0.65rem 1.1rem rgba(0, 0, 0, 0.08);
      }

      textarea {
        min-height: 420px;
        font-family: Consolas, Monaco, 'Courier New', monospace;
      }

      .mono {
        font-family: Consolas, Monaco, 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
          <h1 class="h3 mb-1">Object View / Edit</h1>
          <p id="objectPath" class="text-secondary mb-0 mono"></p>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="javascript:history.back()">Back</a>
          <button id="reloadBtn" class="btn btn-outline-primary">Reload</button>
          <button id="saveBtn" class="btn btn-success">Save</button>
        </div>
      </div>

      <div id="status" class="alert d-none" role="alert"></div>

      <div class="card p-3">
        <label for="editor" class="form-label fw-semibold">JSON</label>
        <textarea id="editor" class="form-control" spellcheck="false"></textarea>
      </div>
    </div>

    <script src="/object.js"></script>
  </body>
</html>
